<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 110" width="88" height="110">
  <title>Mavek</title>
  <desc>Mavek — The Philosopher's Stone logo. Four facets: two gold crown, two black pavilion. S=40 (half-girdle), T=S×0.8, P=S×1.2, C=S×0.45. Shadow: fill #1A1A18, opacity 0.07, gap = stone-height × 0.22, width = stone-width × 0.85.</desc>
  <!-- Ground shadow -->
  <ellipse cx="44" cy="105.6" rx="34" ry="3" fill="#1A1A18" opacity="0.07"/>
  <!-- Stone -->
  <g transform="translate(44, 40)">
    <!-- Crown left — bright gold (catching light) -->
    <path d="M-40 0 L-18 -32 L0 -32 L0 0 Z" fill="#E8C95A"/>
    <!-- Crown right — dark gold (shadow side) -->
    <path d="M0 -32 L18 -32 L40 0 L0 0 Z" fill="#8A7028"/>
    <!-- Pavilion left — warm charcoal -->
    <path d="M-40 0 L0 0 L0 48 Z" fill="#33302A"/>
    <!-- Pavilion right — deep black -->
    <path d="M0 0 L40 0 L0 48 Z" fill="#0A0A08"/>
  </g>
</svg>
