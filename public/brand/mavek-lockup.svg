<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 90" width="260" height="90">
  <title>Mavek — Lockup</title>
  <desc>Mavek horizontal lockup: stone mark + MAVEK wordmark in Instrument Sans 700. Stone S=26. Shadow: #1A1A18 @ 0.07, gap = stone-h × 0.22 = 11.44, width = stone-w × 0.85 = 44.2.</desc>
  <!-- Ground shadow (light bg) -->
  <ellipse cx="36" cy="80.64" rx="22.1" ry="2.5" fill="#1A1A18" opacity="0.07"/>
  <!-- Stone -->
  <g transform="translate(36, 38)">
    <path d="M-26 0 L-11.7 -20.8 L0 -20.8 L0 0 Z" fill="#E8C95A"/>
    <path d="M0 -20.8 L11.7 -20.8 L26 0 L0 0 Z" fill="#8A7028"/>
    <path d="M-26 0 L0 0 L0 31.2 Z" fill="#33302A"/>
    <path d="M0 0 L26 0 L0 31.2 Z" fill="#0A0A08"/>
  </g>
  <!-- Wordmark: Instrument Sans 700, letter-spacing 6, V in gold-mid -->
  <text x="80" y="50" font-family="Instrument Sans, system-ui, -apple-system, sans-serif" font-weight="700" font-size="36" letter-spacing="6" fill="#1A1A18">MA<tspan fill="#C9A84C">V</tspan>EK</text>
</svg>
